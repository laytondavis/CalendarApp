name: Build and Release

# Triggers:
#   1. Any tag starting with 'v' (v1.0.0, v1.0.0-beta, v2.1, etc.)
#   2. Manual run from GitHub → Actions → "Run workflow"
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v1.2.3)'
        required: true
        default: 'v1.0.0'

# Opt into Node.js 24 for all actions (replaces deprecated Node 20 runtime)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Resolve version once; share it with every other job ──────────────────
  prepare:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.ver.outputs.semver }}   # e.g. 1.2.3  (no 'v')
      tag:    ${{ steps.ver.outputs.tag    }}   # e.g. v1.2.3 (with 'v')
    steps:
      - name: Compute semver and tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ inputs.version }}"
          else
            RAW="${{ github.ref_name }}"
          fi
          SEMVER="${RAW#v}"          # strip leading 'v'
          echo "semver=$SEMVER"     >> $GITHUB_OUTPUT
          echo "tag=v$SEMVER"       >> $GITHUB_OUTPUT

      # When triggered manually the tag may not exist yet — create and push it
      - name: Checkout (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Create and push tag (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.ver.outputs.tag }}" || echo "Tag already exists — continuing"
          git push origin "${{ steps.ver.outputs.tag }}" || echo "Tag already pushed — continuing"

  # ── Windows installer (Velopack) ──────────────────────────────────────────
  windows:
    name: Windows — Velopack installer
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Restore workloads
        run: dotnet workload restore CalendarApp/CalendarApp/CalendarApp.csproj

      - name: Restore dependencies
        run: dotnet restore CalendarApp/CalendarApp/CalendarApp.csproj

      - name: Decode Google credentials
        shell: pwsh
        env:
          CREDS_B64: ${{ secrets.GOOGLE_CREDENTIALS_JSON_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CREDS_B64)) {
            Write-Warning "GOOGLE_CREDENTIALS_JSON_BASE64 secret is not set — Google sign-in will be unavailable."
          } else {
            $bytes = [System.Convert]::FromBase64String(($env:CREDS_B64 -replace '[^A-Za-z0-9+/=]', ''))
            [System.IO.File]::WriteAllBytes("CalendarApp/CalendarApp/credentials.json", $bytes)
            Write-Host "Google credentials decoded successfully."
          }

      - name: Publish (self-contained)
        run: >
          dotnet publish CalendarApp/CalendarApp/CalendarApp.csproj
          -c Release
          -f net9.0-desktop
          --self-contained true
          -o publish/desktop
          -p:Version=${{ needs.prepare.outputs.semver }}
          -p:ApplicationDisplayVersion=${{ needs.prepare.outputs.semver }}

      - name: Pack with Velopack
        shell: pwsh
        run: |
          vpk pack `
            --packId      CalendarApp `
            --packVersion ${{ needs.prepare.outputs.semver }} `
            --packDir     publish/desktop `
            --outputDir   releases/windows `
            --mainExe     CalendarApp.exe

      - name: Upload Windows release files
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: releases/windows/

  # ── Android APK ──────────────────────────────────────────────────────────
  android:
    name: Android — APK
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Setup Java 17 (required by Android SDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Restore workloads
        run: dotnet workload restore CalendarApp/CalendarApp/CalendarApp.csproj

      - name: Restore dependencies
        run: dotnet restore CalendarApp/CalendarApp/CalendarApp.csproj

      - name: Decode Google credentials
        shell: pwsh
        env:
          CREDS_B64: ${{ secrets.GOOGLE_CREDENTIALS_JSON_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CREDS_B64)) {
            Write-Warning "GOOGLE_CREDENTIALS_JSON_BASE64 secret is not set — Google sign-in will be unavailable."
          } else {
            $bytes = [System.Convert]::FromBase64String(($env:CREDS_B64 -replace '[^A-Za-z0-9+/=]', ''))
            [System.IO.File]::WriteAllBytes("CalendarApp/CalendarApp/credentials.json", $bytes)
            Write-Host "Google credentials decoded successfully."
          }

      # Release APK, signed with keystore stored in GitHub Secrets.
      # Set up these four secrets in your repo → Settings → Secrets:
      #   ANDROID_KEYSTORE_BASE64   base64-encoded .jks file
      #   ANDROID_KEY_ALIAS         key alias inside the keystore
      #   ANDROID_KEY_PASS          key password
      #   ANDROID_STORE_PASS        keystore password
      - name: Decode keystore
        shell: pwsh
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          $bytes = [System.Convert]::FromBase64String(($env:KEYSTORE_B64 -replace '[^A-Za-z0-9+/=]', ''))
          [System.IO.File]::WriteAllBytes("android.keystore", $bytes)

      - name: Publish Android
        shell: pwsh
        run: >
          dotnet publish CalendarApp/CalendarApp/CalendarApp.csproj
          -c Release
          -f net9.0-android
          -o publish/android
          -p:Version=${{ needs.prepare.outputs.semver }}
          -p:ApplicationDisplayVersion=${{ needs.prepare.outputs.semver }}
          -p:AndroidSigningKeyStore="$(Resolve-Path android.keystore)"
          -p:AndroidSigningKeyAlias="${{ secrets.ANDROID_KEY_ALIAS }}"
          -p:AndroidSigningKeyPass="${{ secrets.ANDROID_KEY_PASS }}"
          -p:AndroidSigningStorePass="${{ secrets.ANDROID_STORE_PASS }}"

      - name: Find signed APK
        id: find_apk
        shell: pwsh
        run: |
          $apk = Get-ChildItem -Path publish/android -Filter "*-Signed.apk" -Recurse |
                 Select-Object -First 1
          if (-not $apk) {
            $apk = Get-ChildItem -Path publish/android -Filter "*.apk" -Recurse |
                   Select-Object -First 1
          }
          echo "APK_PATH=$($apk.FullName)" >> $env:GITHUB_OUTPUT

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ steps.find_apk.outputs.APK_PATH }}

  # ── Create GitHub Release ─────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [prepare, windows, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows release files
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: artifacts/windows

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/windows/*
            artifacts/android/*.apk
